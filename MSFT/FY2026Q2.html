<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;--gl:#3fb950;--rl:#ff7b72;--blue:#58a6ff;--bbg:rgba(88,166,255,.12);--purple:#bc8cff;--yellow:#d29922;--orange:#f0883e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--t1);line-height:1.7;padding:20px;max-width:1200px;margin:0 auto}
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.ticker-badge{display:inline-block;font-size:13px;font-weight:500;color:var(--blue);letter-spacing:2px;background:var(--bbg);padding:4px 16px;border-radius:20px;margin-bottom:12px}
.header h1{font-size:2rem;font-weight:900;margin-bottom:6px}
.header .quarter{font-size:1.1rem;color:var(--t2)}.header .date{font-size:.8rem;color:var(--t3);margin-top:6px}
.overview{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:32px}
.overview h2{font-size:1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--blue)}
.overview p{font-size:.9rem;color:var(--t2);line-height:1.9;margin-bottom:10px}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.tag{font-size:.75rem;padding:3px 12px;border-radius:20px;background:var(--bbg);color:var(--blue);border:1px solid rgba(88,166,255,.2)}
.score-section{text-align:center;padding:40px 20px;margin-bottom:32px;background:linear-gradient(135deg,rgba(63,185,80,.06),rgba(88,166,255,.06));border-radius:16px;border:1px solid var(--border)}
.score-badge{display:inline-flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--gl);border-radius:16px;padding:16px 32px;margin-bottom:14px}
.score-num{font-size:3rem;font-weight:900;color:var(--gl)}.score-icon{font-size:2.5rem}
.score-label{font-size:1.3rem;font-weight:700;color:var(--gl)}
.score-desc{color:var(--t2);font-size:.88rem;margin-top:8px;max-width:750px;margin-left:auto;margin-right:auto;line-height:1.8}
.section{margin-bottom:36px}
.section-title{font-size:1.1rem;font-weight:700;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-label{font-size:.72rem;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.card-val{font-size:1.6rem;font-weight:700}.card-sub{font-size:.8rem;color:var(--t2);margin-top:4px}
.pos{color:var(--gl)}.neg{color:var(--rl)}.neu{color:var(--t1)}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.chart-wrap{position:relative;height:300px}
.insight{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:10px;padding:18px 22px;font-size:.88rem;line-height:1.9;color:var(--t2);margin-bottom:14px}
.insight strong{color:var(--t1)}
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.risk-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.risk-card h3{font-size:.9rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.risk-card ul{list-style:none;padding:0}
.risk-card li{font-size:.84rem;color:var(--t2);padding:6px 0;border-bottom:1px solid rgba(48,54,61,.5);line-height:1.7}
.risk-card li:last-child{border-bottom:none}
.risk-card li::before{content:'•';margin-right:8px;font-weight:700}
.risk-card.bull li::before{color:var(--gl)}.risk-card.bear li::before{color:var(--rl)}
.val-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.val-card{border-radius:14px;padding:24px;text-align:center;border:1px solid var(--border)}
.val-card.low{background:linear-gradient(135deg,rgba(46,160,67,.08),rgba(46,160,67,.03));border-color:rgba(46,160,67,.3)}
.val-card.mid{background:linear-gradient(135deg,rgba(88,166,255,.08),rgba(88,166,255,.03));border-color:rgba(88,166,255,.3)}
.val-card.high{background:linear-gradient(135deg,rgba(188,140,255,.08),rgba(188,140,255,.03));border-color:rgba(188,140,255,.3)}
.val-card .scenario{font-size:.75rem;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.val-card.low .scenario{color:var(--gl)}.val-card.mid .scenario{color:var(--blue)}.val-card.high .scenario{color:var(--purple)}
.val-card .price{font-size:2rem;font-weight:900;margin-bottom:6px}
.val-card.low .price{color:var(--gl)}.val-card.mid .price{color:var(--blue)}.val-card.high .price{color:var(--purple)}
.val-card .detail{font-size:.78rem;color:var(--t2);line-height:1.6}
.val-card .gap{font-size:.85rem;font-weight:700;margin-top:8px}
.tbl{width:100%;border-collapse:collapse;font-size:.85rem}
.tbl th,.tbl td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.tbl th{color:var(--t3);font-weight:500;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
.tbl td{color:var(--t2)}.tbl tr:hover td{background:rgba(88,166,255,.04)}
.footer{text-align:center;padding:32px 20px;border-top:1px solid var(--border);margin-top:40px;color:var(--t3);font-size:.75rem;line-height:1.8}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
