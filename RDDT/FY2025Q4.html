<style>
:root {
  --bg-primary: #0d1117;
  --bg-card: #161b22;
  --bg-card-alt: #1c2333;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --green: #2ea043;
  --green-light: #3fb950;
  --green-bg: rgba(46,160,67,0.15);
  --red: #f85149;
  --red-light: #ff7b72;
  --red-bg: rgba(248,81,73,0.15);
  --blue: #58a6ff;
  --blue-bg: rgba(88,166,255,0.15);
  --purple: #bc8cff;
  --purple-bg: rgba(188,140,255,0.15);
  --yellow: #d29922;
  --yellow-bg: rgba(210,153,34,0.15);
  --orange: #f0883e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Header */
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
.header .ticker {
  font-size: 14px;
  font-weight: 500;
  color: var(--blue);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.header h1 {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 8px;
}
.header .quarter {
  font-size: 18px;
  color: var(--text-secondary);
  font-weight: 400;
}
.header .date {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Company Overview */
.company-overview {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 30px;
}
.company-overview h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.company-overview .overview-grid {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 10px 16px;
  font-size: 14px;
}
.company-overview .overview-label {
  color: var(--text-muted);
  font-weight: 500;
}
.company-overview .overview-value {
  color: var(--text-primary);
}
.company-overview .overview-desc {
  margin-top: 16px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.8;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}
.company-overview .service-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.company-overview .service-tag {
  background: var(--blue-bg);
  color: var(--blue);
  font-size: 12px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 20px;
}

/* Score Section */
.score-section {
  text-align: center;
  padding: 40px 20px;
  margin-bottom: 30px;
  background: linear-gradient(135deg, rgba(46,160,67,0.08), rgba(88,166,255,0.08));
  border-radius: 16px;
  border: 1px solid var(--border);
}
.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-card);
  border: 2px solid var(--green);
  border-radius: 16px;
  padding: 16px 32px;
  margin-bottom: 16px;
}
.score-number {
  font-size: 48px;
  font-weight: 900;
  color: var(--green-light);
}
.score-icon {
  font-size: 42px;
}
.score-label {
  font-size: 22px;
  font-weight: 700;
  color: var(--green-light);
}
.score-desc {
  color: var(--text-secondary);
  font-size: 15px;
  margin-top: 8px;
}

/* Card Grid */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
  margin-bottom: 30px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.card-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.card-value {
  font-size: 28px;
  font-weight: 700;
}
.card-sub {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.positive { color: var(--green-light); }
.negative { color: var(--red-light); }
.neutral { color: var(--text-primary); }
.tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 6px;
  margin-left: 6px;
}
.tag-green { background: var(--green-bg); color: var(--green-light); }
.tag-red { background: var(--red-bg); color: var(--red-light); }
.tag-blue { background: var(--blue-bg); color: var(--blue); }

/* Section */
.section {
  margin-bottom: 30px;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-icon {
  font-size: 20px;
}

/* Chart container */
.chart-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
}
.chart-wrapper {
  position: relative;
  height: 300px;
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.data-table th {
  text-align: left;
  padding: 10px 12px;
  background: var(--bg-card-alt);
  color: var(--text-secondary);
  font-weight: 500;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.data-table tr:hover {
  background: rgba(88,166,255,0.04);
}

/* Insight box */
.insight-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
  font-size: 14px;
  line-height: 1.8;
}
.insight-box.risk {
  border-left-color: var(--red);
}
.insight-box.catalyst {
  border-left-color: var(--green);
}
.insight-label {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 6px;
}

/* Valuation cards */
.val-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}
.val-card {
  border-radius: 12px;
  padding: 24px;
  text-align: center;
}
.val-card.low {
  background: linear-gradient(135deg, rgba(46,160,67,0.12), rgba(46,160,67,0.04));
  border: 1px solid rgba(46,160,67,0.3);
}
.val-card.mid {
  background: linear-gradient(135deg, rgba(88,166,255,0.12), rgba(88,166,255,0.04));
  border: 1px solid rgba(88,166,255,0.3);
}
.val-card.high {
  background: linear-gradient(135deg, rgba(188,140,255,0.12), rgba(188,140,255,0.04));
  border: 1px solid rgba(188,140,255,0.3);
}
.val-scenario {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.val-card.low .val-scenario { color: var(--green-light); }
.val-card.mid .val-scenario { color: var(--blue); }
.val-card.high .val-scenario { color: var(--purple); }
.val-price {
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 4px;
}
.val-card.low .val-price { color: var(--green-light); }
.val-card.mid .val-price { color: var(--blue); }
.val-card.high .val-price { color: var(--purple); }
.val-detail {
  font-size: 12px;
  color: var(--text-secondary);
}
.val-gap {
  font-size: 14px;
  font-weight: 700;
  margin-top: 8px;
}

/* Compare section */
.compare-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.compare-label {
  font-size: 13px;
  color: var(--text-muted);
  min-width: 100px;
}
.compare-arrow {
  font-size: 20px;
  font-weight: 700;
}

/* Responsive */



/* Footer */
.footer {
  text-align: center;
  padding: 30px 20px;
  border-top: 1px solid var(--border);
  margin-top: 40px;
  color: var(--text-muted);
  font-size: 12px;
}

/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
