<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#0d1117;color:#e6edf3;line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:20px}
h1,h2,h3{font-weight:700}

/* Header */
.header{background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);text-align:center;padding:40px 20px 30px;border-bottom:1px solid #21262dposition:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
.header .ticker{font-size:3rem;font-weight:900;color:#58a6ff;letter-spacing:2px}
.header .subtitle{font-size:1.1rem;color:#8b949e;margin-top:4px}
.header .date{font-size:0.85rem;color:#6e7681;margin-top:8px}

/* Score Banner */
.score-banner{background:linear-gradient(135deg,#1a2332,#0d2137);border:1px solid #1f6feb;border-radius:16px;padding:30px;text-align:center;margin:24px 0}
.score-banner .score-icon{font-size:4rem}
.score-banner .score-label{font-size:1.8rem;font-weight:900;color:#58a6ff;margin-top:8px}
.score-banner .score-desc{font-size:1rem;color:#8b949e;margin-top:4px}
.score-banner .score-comment{font-size:0.95rem;color:#c9d1d9;margin-top:12px;padding:10px 20px;background:rgba(88,166,255,0.1);border-radius:8px;display:inline-block}

/* Section */
.section{margin:32px 0}
.section-title{font-size:1.3rem;color:#58a6ff;border-left:4px solid #1f6feb;padding-left:12px;margin-bottom:16px}

/* Cards Grid */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px}
.card .label{font-size:0.8rem;color:#8b949e;margin-bottom:4px}
.card .value{font-size:1.5rem;font-weight:700}
.card .sub{font-size:0.8rem;margin-top:4px}
.green{color:#2ea043}.red{color:#f85149}.blue{color:#58a6ff}.yellow{color:#d29922}.gray{color:#8b949e}

/* Wide Card */
.card-wide{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:24px;margin-bottom:16px}

/* Chart Container */
.chart-container{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:24px;margin-bottom:16px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
canvas{max-height:320px}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:0.9rem}
.data-table th{background:#161b22;color:#58a6ff;padding:10px 12px;text-align:left;border-bottom:1px solid #30363d;font-weight:500}
.data-table td{padding:10px 12px;border-bottom:1px solid #21262d}
.data-table tr:hover{background:#1c2128}
.data-table .right{text-align:right}

/* Segment Bar */
.seg-bar{display:flex;height:32px;border-radius:8px;overflow:hidden;margin:8px 0}
.seg-bar div{display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#fff;min-width:30px}

/* Valuation Cards */
.val-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.val-card{border-radius:12px;padding:24px;text-align:center}
.val-card.low{background:linear-gradient(135deg,#0d2818,#132f1e);border:1px solid #238636}
.val-card.mid{background:linear-gradient(135deg,#151d2b,#1a2332);border:1px solid #1f6feb}
.val-card.high{background:linear-gradient(135deg,#2a1520,#301a24);border:1px solid #da3633}
.val-card .val-label{font-size:0.85rem;font-weight:700;margin-bottom:8px}
.val-card .val-price{font-size:2rem;font-weight:900}
.val-card .val-detail{font-size:0.8rem;color:#8b949e;margin-top:8px}
.val-card .val-gap{font-size:0.95rem;font-weight:700;margin-top:8px}
.val-card .val-judge{font-size:0.85rem;margin-top:4px;padding:4px 12px;border-radius:20px;display:inline-block}

/* Comment Box */
.comment-box{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px;margin-bottom:12px}
.comment-box .speaker{font-weight:700;color:#58a6ff;margin-bottom:6px;font-size:0.9rem}
.comment-box .quote{color:#c9d1d9;font-size:0.9rem;line-height:1.7;border-left:3px solid #30363d;padding-left:12px}

/* Risk/Catalyst */
.risk-list{list-style:none;padding:0}
.risk-list li{padding:8px 0;border-bottom:1px solid #21262d;font-size:0.9rem}
.risk-list li:last-child{border:none}
.risk-list .icon{margin-right:6px}

/* Comparison */
.compare-row{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;text-align:center;margin:16px 0}
.compare-card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px}
.compare-arrow{font-size:2rem;color:#58a6ff}

/* Footer */
.footer{text-align:center;padding:30px;color:#484f58;font-size:0.8rem;border-top:1px solid #21262d;margin-top:40px}



/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
.header-content { position: relative; z-index: 1; }
.ticker-badge {
  display: inline-block;
  background: rgba(88,166,255,0.15);
  border: 1px solid rgba(88,166,255,0.3);
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 14px;
  color: var(--blue);
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.header h1 { font-size: 2.2em; font-weight: 900; margin-bottom: 4px; }
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
