<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atlas Admin Activate</title>
<style>
body{background:#0F1829;color:#F5F2EC;font-family:'Noto Sans JP',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.box{text-align:center;max-width:400px;padding:40px}
h1{font-size:1.3rem;margin-bottom:16px;color:#D4A843}
p{font-size:.9rem;color:#A8B0BC;line-height:1.8;margin-bottom:24px}
.btn{display:inline-block;background:#B8912A;color:#0F1829;padding:14px 32px;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:background .15s}
.btn:hover{background:#D4A843}
.done{color:#2ecc71;font-size:1rem;margin-top:20px;display:none}
</style>
</head>
<body>
<div class="box">
<h1>Atlas Admin Activation</h1>
<p>管理者モードを有効化します。<br>全レポートのペイウォールがバイパスされます。</p>
<button class="btn" onclick="activate()">有効化する</button>
<div class="done" id="done">管理者モードが有効化されました。<br>このページを閉じてレポートをご覧ください。</div>
</div>
<script>
function activate(){
  document.cookie='atlas_admin=1;path=/;max-age=31536000;SameSite=Lax';
  document.getElementById('done').style.display='block';
  document.querySelector('.btn').textContent='有効化済み';
  document.querySelector('.btn').style.background='#243158';
  document.querySelector('.btn').style.color='#A8B0BC';
}
</script>
</body>
</html>
