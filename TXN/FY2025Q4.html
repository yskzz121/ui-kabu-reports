<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.7}
.container{max-width:1200px;margin:0 auto;padding:20px}
h1,h2,h3{color:#e6edf3}
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
.header h1{font-size:2.2em;font-weight:900;margin-bottom:8px}
.header .subtitle{color:#8b949e;font-size:1.1em}
.ticker-badge{display:inline-block;background:#1f6feb;color:#fff;padding:4px 16px;border-radius:20px;font-weight:700;font-size:1.3em;margin-bottom:12px}
.section{margin:32px 0}
.section-title{font-size:1.4em;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px}
/* Score Card */
.score-card{background:linear-gradient(135deg,#161b22,#1c2333);border:2px solid #1f6feb;border-radius:16px;padding:32px;text-align:center;margin:24px 0}
.score-number{font-size:5em;font-weight:900;color:#1f6feb}
.score-icon{font-size:3em}
.score-label{font-size:1.5em;font-weight:700;color:#e6edf3;margin-top:4px}
.score-desc{color:#8b949e;margin-top:8px;font-size:1.05em}
/* Cards Grid */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin:16px 0}
.card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px;text-align:center;transition:transform .2s}
.card:hover{transform:translateY(-2px)}
.card .label{color:#8b949e;font-size:.85em;margin-bottom:6px}
.card .value{font-size:1.6em;font-weight:700}
.card .sub{font-size:.85em;margin-top:4px}
.green{color:#2ea043}.red{color:#f85149}.blue{color:#58a6ff}.yellow{color:#d29922}.white{color:#e6edf3}
.beat{background:rgba(46,160,67,.1);border-color:rgba(46,160,67,.3)}
.miss{background:rgba(248,81,73,.1);border-color:rgba(248,81,73,.3)}
/* Table */
table{width:100%;border-collapse:collapse;margin:12px 0}
th,td{padding:10px 14px;text-align:right;border-bottom:1px solid #21262d;font-size:.95em}
th{color:#8b949e;font-weight:500;font-size:.85em;text-transform:uppercase}
td:first-child,th:first-child{text-align:left}
tr:hover{background:rgba(31,111,235,.05)}
/* Chart Container */
.chart-container{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px;margin:16px 0}
.chart-wrapper{position:relative;height:320px}
/* Valuation Cards */
.val-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin:16px 0}
.val-card{border-radius:12px;padding:24px;text-align:center}
.val-low{background:linear-gradient(135deg,#0d2818,#132f1e);border:1px solid #2ea043}
.val-mid{background:linear-gradient(135deg,#0d1b2e,#132340);border:1px solid #1f6feb}
.val-high{background:linear-gradient(135deg,#2d1524,#3b1a30);border:1px solid #da3633}
.val-card .val-label{font-size:.9em;color:#8b949e;margin-bottom:4px}
.val-card .val-price{font-size:2.2em;font-weight:900}
.val-card .val-detail{font-size:.85em;color:#8b949e;margin-top:8px}
/* Highlight Box */
.highlight{background:#161b22;border-left:4px solid #1f6feb;border-radius:0 8px 8px 0;padding:16px 20px;margin:12px 0}
.highlight.positive{border-left-color:#2ea043}
.highlight.negative{border-left-color:#f85149}
.highlight.warning{border-left-color:#d29922}
/* Tag */
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.8em;font-weight:500;margin:2px}
.tag-green{background:rgba(46,160,67,.15);color:#2ea043}
.tag-red{background:rgba(248,81,73,.15);color:#f85149}
.tag-blue{background:rgba(88,166,255,.15);color:#58a6ff}
.tag-yellow{background:rgba(210,153,34,.15);color:#d29922}
/* List */
.insight-list{list-style:none;padding:0}
.insight-list li{padding:8px 0;border-bottom:1px solid #21262d;display:flex;gap:10px;align-items:flex-start}
.insight-list li:last-child{border-bottom:none}
/* Comparison */
.compare-row{display:flex;gap:16px;margin:8px 0;flex-wrap:wrap}
.compare-item{flex:1;min-width:200px;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:12px 16px}
.footer{text-align:center;padding:32px;color:#484f58;font-size:.85em;border-top:1px solid #21262d;margin-top:40px}
/* Responsive */



/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:c
.header-content { position: relative; z-index: 1; }
.header .date { color: var(--text-sub); font-size: 0.85em; margin-top: 8px; }
enter;gap:16px;margin-bottom:8px}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
