<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.7;padding:20px}
.container{max-width:1200px;margin:0 auto}
h1,h2,h3{color:#e6edf3}
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
.header .ticker{font-size:14px;color:#8b949e;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px}
.header h1{font-size:32px;font-weight:900;margin-bottom:4px}
.header .quarter{font-size:18px;color:#8b949e;margin-bottom:16px}
.header .date{font-size:13px;color:#484f58}
.score-section{text-align:center;padding:40px 20px;margin-bottom:32px}
.score-badge{display:inline-flex;align-items:center;gap:16px;background:linear-gradient(135deg,#1a3a2a,#0d2818);border:2px solid #2ea043;border-radius:20px;padding:20px 40px}
.score-badge .icon{font-size:48px}
.score-badge .score-text{text-align:left}
.score-badge .score-num{font-size:42px;font-weight:900;color:#2ea043}
.score-badge .score-label{font-size:16px;color:#7ee787;font-weight:500}
.score-detail{margin-top:16px;font-size:14px;color:#8b949e;max-width:700px;margin-left:auto;margin-right:auto}
section{margin-bottom:40px}
section > h2{font-size:20px;font-weight:700;padding:12px 0;border-bottom:2px solid #21262d;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px}
.card .label{font-size:12px;color:#8b949e;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.card .value{font-size:28px;font-weight:700;color:#e6edf3}
.card .sub{font-size:13px;margin-top:4px}
.positive{color:#2ea043}
.negative{color:#f85149}
.neutral{color:#d29922}
.beat{background:rgba(46,160,67,0.1);border-color:rgba(46,160,67,0.3)}
.miss{background:rgba(248,81,73,0.1);border-color:rgba(248,81,73,0.3)}
table{width:100%;border-collapse:collapse;background:#161b22;border-radius:12px;overflow:hidden;margin-bottom:16px}
th{background:#1c2128;color:#8b949e;font-size:12px;font-weight:500;text-align:left;padding:12px 16px;text-transform:uppercase;letter-spacing:0.5px}
td{padding:12px 16px;border-top:1px solid #21262d;font-size:14px}
tr:hover{background:#1c2128}
.chart-container{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:24px;margin-bottom:16px}
.chart-wrap{position:relative;height:320px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.highlight-box{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:24px;margin-bottom:16px}
.highlight-box h3{font-size:16px;margin-bottom:12px;color:#e6edf3}
.highlight-box ul{padding-left:20px}
.highlight-box li{margin-bottom:8px;font-size:14px;color:#c9d1d9}
.valuation-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.val-card{border-radius:12px;padding:24px;text-align:center}
.val-card.low{background:linear-gradient(135deg,#0d2818,#1a3a2a);border:1px solid #2ea043}
.val-card.mid{background:linear-gradient(135deg,#0d1926,#162840);border:1px solid #388bfd}
.val-card.high{background:linear-gradient(135deg,#2a0d1e,#3d1a2e);border:1px solid #f778ba}
.val-card .val-label{font-size:13px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.val-card.low .val-label{color:#7ee787}
.val-card.mid .val-label{color:#79c0ff}
.val-card.high .val-label{color:#f778ba}
.val-card .val-price{font-size:36px;font-weight:900;color:#e6edf3;margin-bottom:4px}
.val-card .val-detail{font-size:13px;color:#8b949e}
.val-card .val-gap{font-size:15px;font-weight:700;margin-top:8px}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.tag-green{background:rgba(46,160,67,0.15);color:#7ee787}
.tag-red{background:rgba(248,81,73,0.15);color:#f85149}
.tag-yellow{background:rgba(210,153,34,0.15);color:#d29922}
.tag-blue{background:rgba(56,139,253,0.15);color:#79c0ff}
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.footer{text-align:center;padding:40px 20px;color:#484f58;font-size:12px;border-top:1px solid #21262d;margin-top:40px}
.segment-bar{height:28px;border-radius:6px;overflow:hidden;display:flex;margin:8px 0}
.segment-bar div{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#fff}
.compare-card{display:flex;align-items:center;gap:12px;padding:16px;background:#161b22;border:1px solid #21262d;border-radius:12px;margin-bottom:12px}
.compare-arrow{font-size:28px;font-weight:900}
.kpi-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}

/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;marg
.header-content { position: relative; z-index: 1; }
.ticker-badge {
  display: inline-block;
  background: rgba(88,166,255,0.15);
  border: 1px solid rgba(88,166,255,0.3);
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 14px;
  color: var(--blue);
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.header .subtitle { color: var(--text-sub); font-size: 1.1em; }
in-bottom:8px}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
