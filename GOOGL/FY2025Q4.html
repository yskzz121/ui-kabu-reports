<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --card-border: #30363d;
  --text: #e6edf3;
  --text-sub: #8b949e;
  --green: #2ea043;
  --green-light: #3fb950;
  --red: #f85149;
  --red-light: #ff7b72;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --yellow: #d29922;
  --orange: #f0883e;
  --cyan: #39d2c0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 0;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Header */
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(88,166,255,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 50%, rgba(46,160,67,0.06) 0%, transparent 60%);
}
.header-content { position: relative; z-index: 1; }
.ticker-badge {
  display: inline-block;
  background: rgba(88,166,255,0.15);
  border: 1px solid rgba(88,166,255,0.3);
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 14px;
  color: var(--blue);
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.header h1 { font-size: 2.2em; font-weight: 900; margin-bottom: 4px; }
.header .subtitle { color: var(--text-sub); font-size: 1.1em; }
.header .date { color: var(--text-sub); font-size: 0.85em; margin-top: 8px; }

/* Score Section */
.score-section {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 32px;
  margin: 24px 0;
  text-align: center;
}
.score-big {
  font-size: 5em;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
}
.score-label {
  font-size: 1.6em;
  font-weight: 700;
  margin-bottom: 8px;
}
.score-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 16px 0;
}
.score-dot {
  width: 40px;
  height: 8px;
  border-radius: 4px;
  background: var(--card-border);
}
.score-dot.active { background: var(--green); }
.score-summary {
  color: var(--text-sub);
  font-size: 0.95em;
  max-width: 700px;
  margin: 0 auto;
  line-height: 1.7;
}

/* Metric Cards */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin: 24px 0;
}
.metric-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 20px;
}
.metric-label {
  font-size: 0.8em;
  color: var(--text-sub);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.metric-value {
  font-size: 1.8em;
  font-weight: 700;
}
.metric-change {
  font-size: 0.85em;
  margin-top: 4px;
}
.positive { color: var(--green-light); }
.negative { color: var(--red-light); }
.neutral { color: var(--text-sub); }

/* Section */
.section {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 28px;
  margin: 24px 0;
}
.section-title {
  font-size: 1.3em;
  font-weight: 700;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--card-border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-icon {
  font-size: 1.2em;
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9em;
}
.data-table th {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 2px solid var(--card-border);
  color: var(--text-sub);
  font-weight: 500;
  font-size: 0.85em;
}
.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(48,54,61,0.5);
}
.data-table tr:last-child td { border-bottom: none; }
.data-table .right { text-align: right; }

/* Chart */
.chart-container {
  position: relative;
  height: 300px;
  margin: 16px 0;
}
.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* Consensus Beat */
.beat-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  border-radius: 10px;
  background: rgba(46,160,67,0.08);
  border: 1px solid rgba(46,160,67,0.2);
  margin-bottom: 12px;
}
.beat-card.miss {
  background: rgba(248,81,73,0.08);
  border-color: rgba(248,81,73,0.2);
}
.beat-icon {
  font-size: 2em;
  flex-shrink: 0;
}
.beat-details { flex: 1; }
.beat-label { font-size: 0.8em; color: var(--text-sub); }
.beat-values { display: flex; gap: 20px; margin-top: 4px; }
.beat-item { font-size: 0.9em; }

/* Progress bar */
.progress-wrap { margin: 12px 0; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.85em;
  margin-bottom: 4px;
}
.progress-bar {
  height: 8px;
  background: var(--card-border);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s;
}

/* Technical cards */
.tech-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.tech-card {
  background: rgba(22,27,34,0.8);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 16px;
}
.tech-card-title {
  font-size: 0.85em;
  color: var(--text-sub);
  margin-bottom: 10px;
  font-weight: 500;
}
.tech-indicator {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 0.9em;
  border-bottom: 1px solid rgba(48,54,61,0.3);
}
.tech-indicator:last-child { border-bottom: none; }
.signal-badge {
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.75em;
  font-weight: 700;
}
.signal-buy { background: rgba(46,160,67,0.2); color: var(--green-light); }
.signal-sell { background: rgba(248,81,73,0.2); color: var(--red-light); }
.signal-neutral { background: rgba(139,148,158,0.2); color: var(--text-sub); }

/* Risk/Catalyst */
.risk-list, .catalyst-list {
  list-style: none;
  padding: 0;
}
.risk-list li, .catalyst-list li {
  padding: 8px 0 8px 24px;
  position: relative;
  font-size: 0.9em;
  border-bottom: 1px solid rgba(48,54,61,0.3);
}
.risk-list li:last-child, .catalyst-list li:last-child { border-bottom: none; }
.risk-list li::before {
  content: '⚠';
  position: absolute;
  left: 0;
}
.catalyst-list li::before {
  content: '✦';
  position: absolute;
  left: 0;
  color: var(--green-light);
}

/* Valuation cards */
.val-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.val-card {
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  border: 1px solid;
}
.val-card.low {
  background: rgba(46,160,67,0.08);
  border-color: rgba(46,160,67,0.25);
}
.val-card.mid {
  background: rgba(88,166,255,0.08);
  border-color: rgba(88,166,255,0.25);
}
.val-card.high {
  background: rgba(188,140,255,0.08);
  border-color: rgba(188,140,255,0.25);
}
.val-scenario {
  font-size: 0.8em;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.val-price {
  font-size: 2.2em;
  font-weight: 900;
  margin-bottom: 4px;
}
.val-card.low .val-price { color: var(--green-light); }
.val-card.mid .val-price { color: var(--blue); }
.val-card.high .val-price { color: var(--purple); }
.val-detail {
  font-size: 0.8em;
  color: var(--text-sub);
  margin-top: 4px;
}
.val-gap {
  margin-top: 12px;
  font-size: 0.9em;
  font-weight: 500;
}

/* Company Overview */
.overview-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.overview-item {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(48,54,61,0.3);
}
.overview-label {
  color: var(--text-sub);
  font-size: 0.85em;
  min-width: 100px;
}
.overview-value {
  font-size: 0.9em;
}

/* Quote card */
.quote-card {
  background: rgba(22,27,34,0.6);
  border-left: 3px solid var(--blue);
  padding: 16px 20px;
  margin: 12px 0;
  border-radius: 0 8px 8px 0;
  font-size: 0.9em;
  line-height: 1.7;
}
.quote-speaker {
  color: var(--blue);
  font-weight: 500;
  font-size: 0.85em;
  margin-top: 6px;
}

/* Comparison */
.compare-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0;
}
.compare-arrow {
  font-size: 1.5em;
  flex-shrink: 0;
}

/* Footer */
.footer {
  text-align: center;
  padding: 24px;
  color: var(--text-sub);
  font-size: 0.8em;
  border-top: 1px solid var(--card-border);
  margin-top: 32px;
}

/* Responsive */


/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
