<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  line-height: 1.6;
  padding: 20px;
}
.container { max-width: 1200px; margin: 0 auto; }

/* Header */
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
.header .ticker {
  font-size: 14px;
  color: #8b949e;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.header h1 {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 4px;
  background: linear-gradient(90deg, #FFFC00, #FFD700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header .period {
  font-size: 16px;
  color: #8b949e;
  margin-bottom: 16px;
}
.header .date {
  font-size: 12px;
  color: #484f58;
}

/* Score Section */
.score-section {
  background: linear-gradient(135deg, #161b22, #1c2333);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 24px;
  border: 1px solid #30363d;
  text-align: center;
}
.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 20px 40px;
  margin-bottom: 16px;
}
.score-number {
  font-size: 64px;
  font-weight: 900;
  color: #e3b341;
}
.score-icon { font-size: 48px; }
.score-label {
  font-size: 24px;
  font-weight: 700;
  color: #e3b341;
}
.score-desc {
  font-size: 14px;
  color: #8b949e;
  margin-top: 8px;
}

/* Card Grid */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 20px;
}
.card-title {
  font-size: 12px;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.card-value {
  font-size: 28px;
  font-weight: 700;
}
.card-sub {
  font-size: 13px;
  margin-top: 4px;
}
.positive { color: #2ea043; }
.negative { color: #f85149; }
.neutral { color: #e3b341; }

/* Chart Section */
.chart-section {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}
.chart-section h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid #21262d;
}
.chart-container {
  position: relative;
  height: 300px;
  width: 100%;
}

/* Section */
.section {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}
.section h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid #21262d;
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th, .data-table td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid #21262d;
  font-size: 14px;
}
.data-table th {
  color: #8b949e;
  font-weight: 500;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table .right { text-align: right; }

/* Valuation Cards */
.val-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.val-card {
  border-radius: 12px;
  padding: 24px;
  text-align: center;
}
.val-card.low {
  background: linear-gradient(135deg, #0d2818, #1a4028);
  border: 1px solid #2ea043;
}
.val-card.mid {
  background: linear-gradient(135deg, #0d1b2a, #1a2d45);
  border: 1px solid #388bfd;
}
.val-card.high {
  background: linear-gradient(135deg, #2a0d1e, #451a2d);
  border: 1px solid #f85149;
}
.val-card .val-label {
  font-size: 12px;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.val-card .val-price {
  font-size: 32px;
  font-weight: 900;
}
.val-card .val-detail {
  font-size: 12px;
  color: #8b949e;
  margin-top: 8px;
}
.val-card.low .val-price { color: #2ea043; }
.val-card.mid .val-price { color: #388bfd; }
.val-card.high .val-price { color: #f85149; }

/* Risk & Catalyst */
.risk-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.risk-col h3 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.risk-col ul {
  list-style: none;
  padding: 0;
}
.risk-col li {
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px solid #21262d;
  padding-left: 16px;
  position: relative;
}
.risk-col li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 14px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.risk-col.risks li::before { background: #f85149; }
.risk-col.catalysts li::before { background: #2ea043; }

/* Comments */
.comment-block {
  background: rgba(255,255,255,0.03);
  border-left: 3px solid #388bfd;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 0 8px 8px 0;
}
.comment-block .speaker {
  font-size: 12px;
  color: #388bfd;
  font-weight: 700;
  margin-bottom: 4px;
}
.comment-block p {
  font-size: 13px;
  color: #c9d1d9;
}

/* Comparison */
.comparison-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 20px;
}
.comp-box {
  text-align: center;
  padding: 16px 24px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  min-width: 120px;
}
.comp-box .comp-label { font-size: 12px; color: #8b949e; }
.comp-box .comp-value { font-size: 24px; font-weight: 700; }
.comp-arrow { font-size: 32px; color: #e3b341; }

/* Segment bars */
.segment-bar-container { margin-bottom: 16px; }
.segment-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 4px;
}
.segment-bar {
  height: 24px;
  background: #21262d;
  border-radius: 4px;
  overflow: hidden;
}
.segment-fill {
  height: 100%;
  border-radius: 4px;
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-size: 11px;
  font-weight: 500;
}

/* Responsive */



/* Footer */
.footer {
  text-align: center;
  padding: 24px;
  color: #484f58;
  font-size: 12px;
}

/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
