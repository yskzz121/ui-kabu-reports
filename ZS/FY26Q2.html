<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  line-height: 1.7;
  padding: 20px;
}
.container { max-width: 1200px; margin: 0 auto; }

/* Header */
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #1f6feb, #58a6ff, #1f6feb);
}
.header .ticker { font-size: 48px; font-weight: 900; color: #58a6ff; letter-spacing: 4px; }
.header .company-name { font-size: 18px; color: #8b949e; margin-top: 4px; }
.header .quarter { font-size: 22px; color: #c9d1d9; margin-top: 8px; font-weight: 500; }
.header .date { font-size: 14px; color: #8b949e; margin-top: 4px; }

/* Score Section */
.score-section {
  background: linear-gradient(135deg, #161b22, #1c2533);
  border-radius: 16px;
  border: 1px solid #30363d;
  padding: 32px;
  margin-bottom: 24px;
  text-align: center;
}
.score-icon { font-size: 64px; }
.score-label { font-size: 28px; font-weight: 700; margin-top: 8px; }
.score-number { font-size: 80px; font-weight: 900; color: #58a6ff; }
.score-sublabel { font-size: 16px; color: #8b949e; margin-top: 4px; }
.score-detail { font-size: 14px; color: #8b949e; margin-top: 12px; max-width: 600px; margin-left: auto; margin-right: auto; }

/* Card Grid */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.card {
  background: #161b22;
  border-radius: 12px;
  border: 1px solid #30363d;
  padding: 20px;
  transition: border-color 0.2s;
}
.card:hover { border-color: #58a6ff; }
.card-title { font-size: 13px; color: #8b949e; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
.card-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
.card-sub { font-size: 13px; margin-top: 4px; }
.green { color: #2ea043; }
.red { color: #f85149; }
.blue { color: #58a6ff; }
.yellow { color: #d29922; }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}
.badge-green { background: rgba(46,160,67,0.15); color: #2ea043; }
.badge-red { background: rgba(248,81,73,0.15); color: #f85149; }

/* Section */
.section {
  background: #161b22;
  border-radius: 16px;
  border: 1px solid #30363d;
  padding: 24px;
  margin-bottom: 24px;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid #30363d;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title .icon { font-size: 20px; }

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.data-table th {
  text-align: left;
  color: #8b949e;
  font-weight: 500;
  padding: 8px 12px;
  border-bottom: 1px solid #30363d;
}
.data-table td {
  padding: 8px 12px;
  border-bottom: 1px solid #21262d;
}
.data-table tr:last-child td { border-bottom: none; }

/* Chart Container */
.chart-container {
  position: relative;
  height: 320px;
  margin: 16px 0;
}
.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

/* Valuation Cards */
.val-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.val-card {
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  border: 1px solid #30363d;
}
.val-card.low { background: linear-gradient(135deg, #0d2818, #13301e); border-color: #238636; }
.val-card.mid { background: linear-gradient(135deg, #0d1b2e, #112240); border-color: #1f6feb; }
.val-card.high { background: linear-gradient(135deg, #2d1228, #3b1530); border-color: #da3633; }
.val-scenario { font-size: 14px; font-weight: 700; letter-spacing: 2px; }
.val-price { font-size: 36px; font-weight: 900; margin: 8px 0; }
.val-detail { font-size: 12px; color: #8b949e; }

/* Highlight box */
.highlight-box {
  background: #1c2333;
  border-left: 3px solid #58a6ff;
  padding: 16px 20px;
  border-radius: 0 8px 8px 0;
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.8;
}
.highlight-box.risk {
  border-left-color: #f85149;
  background: #2d1518;
}
.highlight-box.catalyst {
  border-left-color: #2ea043;
  background: #0d2818;
}

/* Risk/Catalyst list */
.rc-list { list-style: none; padding: 0; }
.rc-list li {
  padding: 8px 0;
  border-bottom: 1px solid #21262d;
  font-size: 14px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.rc-list li:last-child { border-bottom: none; }
.rc-list .icon { flex-shrink: 0; margin-top: 2px; }

/* Comparison */
.comparison-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: center;
  text-align: center;
}
.comparison-arrow { font-size: 32px; color: #58a6ff; }

/* Responsive */



/* Footer */
.footer {
  text-align: center;
  padding: 24px;
  color: #484f58;
  font-size: 12px;
}

/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
