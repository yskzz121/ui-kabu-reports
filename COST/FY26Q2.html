<style>
:root {
  --bg-primary: #0d1117;
  --bg-card: #161b22;
  --bg-card-alt: #1c2333;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --green: #2ea043;
  --green-light: #3fb950;
  --green-bg: rgba(46,160,67,0.15);
  --red: #f85149;
  --red-bg: rgba(248,81,73,0.15);
  --blue: #58a6ff;
  --blue-bg: rgba(88,166,255,0.15);
  --purple: #bc8cff;
  --yellow: #d29922;
  --orange: #f0883e;
  --cyan: #39d2c0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--green), var(--blue), var(--purple));
}
.header .ticker {
  font-size: 14px;
  color: var(--blue);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.header h1 {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 4px;
}
.header .subtitle {
  color: var(--text-secondary);
  font-size: 15px;
}
.header .date {
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 8px;
}

/* Score Section */
.score-section {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 32px;
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-bottom: 24px;
}
.score-badge {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  background: linear-gradient(135deg, rgba(46,160,67,0.2), rgba(46,160,67,0.05));
  border: 3px solid var(--green);
  flex-shrink: 0;
}
.score-text h2 {
  font-size: 28px;
  font-weight: 700;
  color: var(--green-light);
}
.score-text .score-label {
  font-size: 16px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.score-text .score-detail {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 8px;
  max-width: 500px;
}
.score-bar {
  display: flex;
  gap: 6px;
  margin-top: 12px;
}
.score-dot {
  width: 24px;
  height: 8px;
  border-radius: 4px;
  background: var(--border);
}
.score-dot.active {
  background: var(--green);
}

/* Cards Grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.card {
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 20px;
}
.card-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.card-value {
  font-size: 28px;
  font-weight: 700;
}
.card-sub {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.positive { color: var(--green-light); }
.negative { color: var(--red); }
.neutral { color: var(--blue); }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}
.badge-green { background: var(--green-bg); color: var(--green-light); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }

/* Section */
.section {
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 24px;
  margin-bottom: 24px;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

/* Chart */
.chart-container {
  position: relative;
  height: 320px;
  margin: 16px 0;
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.data-table th {
  text-align: left;
  padding: 10px 12px;
  color: var(--text-muted);
  font-weight: 500;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(48,54,61,0.5);
}
.data-table tr:last-child td { border-bottom: none; }
.data-table .highlight { background: rgba(88,166,255,0.05); }

/* Valuation Cards */
.val-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.val-card {
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  border: 1px solid var(--border);
}
.val-card.low {
  background: linear-gradient(135deg, rgba(46,160,67,0.1), rgba(46,160,67,0.02));
  border-color: rgba(46,160,67,0.3);
}
.val-card.mid {
  background: linear-gradient(135deg, rgba(88,166,255,0.1), rgba(88,166,255,0.02));
  border-color: rgba(88,166,255,0.3);
}
.val-card.high {
  background: linear-gradient(135deg, rgba(188,140,255,0.1), rgba(188,140,255,0.02));
  border-color: rgba(188,140,255,0.3);
}
.val-card .val-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.val-card.low .val-label { color: var(--green); }
.val-card.mid .val-label { color: var(--blue); }
.val-card.high .val-label { color: var(--purple); }
.val-card .val-price {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 8px;
}
.val-card .val-detail {
  font-size: 12px;
  color: var(--text-secondary);
}
.val-card .val-gap {
  margin-top: 8px;
  font-size: 14px;
  font-weight: 700;
}

/* Risk/Catalyst */
.risk-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.risk-item, .catalyst-item {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.5;
}
.risk-item {
  background: var(--red-bg);
  border-left: 3px solid var(--red);
}
.catalyst-item {
  background: var(--green-bg);
  border-left: 3px solid var(--green);
}

/* Comment */
.comment-block {
  padding: 16px;
  background: var(--bg-card-alt);
  border-radius: 8px;
  border-left: 3px solid var(--blue);
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.7;
}
.comment-speaker {
  font-size: 12px;
  color: var(--blue);
  font-weight: 700;
  margin-bottom: 6px;
}

/* Comparison */
.compare-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(48,54,61,0.5);
}
.compare-label { flex: 1; font-size: 14px; color: var(--text-secondary); }
.compare-prev { flex: 1; text-align: center; font-size: 14px; }
.compare-arrow { font-size: 20px; flex: 0 0 40px; text-align: center; }
.compare-curr { flex: 1; text-align: center; font-size: 14px; font-weight: 700; }

/* Margin bars */
.margin-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.margin-label {
  width: 160px;
  font-size: 13px;
  color: var(--text-secondary);
  flex-shrink: 0;
}
.margin-bar-bg {
  flex: 1;
  height: 24px;
  background: rgba(48,54,61,0.5);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}
.margin-bar {
  height: 100%;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  min-width: 50px;
}
.margin-val {
  width: 60px;
  text-align: right;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
}

/* Footer */
.footer {
  text-align: center;
  padding: 24px;
  color: var(--text-muted);
  font-size: 12px;
}




/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
