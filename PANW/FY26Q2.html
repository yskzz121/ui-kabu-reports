<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.7;padding:0 0 60px}
.container{max-width:1200px;margin:0 auto;padding:0 20px}
h1,h2,h3{color:#e6edf3}
a{color:#58a6ff}

/* Header */
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
.header h1{font-size:1.8rem;font-weight:700;margin-bottom:8px}
.header .subtitle{font-size:1rem;color:#8b949e;margin-bottom:16px}
.header .period{font-size:0.9rem;color:#8b949e}

/* Section */
.section{margin-top:40px}
.section-title{font-size:1.3rem;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #30363d;display:flex;align-items:center;gap:10px}
.section-title .icon{font-size:1.4rem}

/* Cards */
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;margin-bottom:16px;transition:border-color .2s}
.card:hover{border-color:#484f58}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px}
.metric-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;text-align:center;position:relative;overflow:hidden}
.metric-card.green{border-left:4px solid #2ea043}
.metric-card.red{border-left:4px solid #f85149}
.metric-card .label{font-size:0.78rem;color:#8b949e;margin-bottom:6px;font-weight:500}
.metric-card .value{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.metric-card .sub{font-size:0.78rem;font-weight:400}
.metric-card.green .value,.metric-card.green .sub{color:#2ea043}
.metric-card.red .value,.metric-card.red .sub{color:#f85149}

/* Score */
.score-section{text-align:center;padding:30px}
.score-badge{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,#1a2332,#162415);border:2px solid #2ea043;border-radius:16px;padding:16px 32px;margin-bottom:16px}
.score-num{font-size:2.8rem;font-weight:700;color:#2ea043}
.score-label{font-size:1rem;color:#2ea043;text-align:left}
.score-reason{font-size:0.9rem;color:#8b949e;max-width:800px;margin:16px auto 0;line-height:1.8}

/* Chart */
.chart-container{position:relative;width:100%;max-width:100%;margin:0 auto}
.chart-container canvas{max-height:400px}

/* Donut */
.donut-wrapper{display:flex;flex-wrap:wrap;gap:30px;align-items:center;justify-content:center}
.donut-chart{width:250px;height:250px}
.donut-legend{display:flex;flex-direction:column;gap:12px}
.donut-legend-item{display:flex;align-items:center;gap:10px;font-size:0.9rem}
.donut-legend-item .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}

/* Margin bars */
.margin-bar-group{margin-bottom:18px}
.margin-bar-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.88rem}
.margin-bar-track{background:#21262d;border-radius:6px;height:24px;overflow:hidden;position:relative}
.margin-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:0.75rem;font-weight:700;color:#fff;transition:width .6s}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:0.88rem}
.data-table th{background:#21262d;color:#8b949e;padding:12px 14px;text-align:left;font-weight:500;border-bottom:1px solid #30363d}
.data-table td{padding:12px 14px;border-bottom:1px solid #21262d}
.data-table tr:hover td{background:#1c2128}
.trend-up{color:#2ea043;font-weight:700}
.trend-down{color:#f85149;font-weight:700}
.trend-flat{color:#d29922;font-weight:700}

/* Risk/Catalyst */
.rc-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.rc-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px}
.rc-card h3{font-size:1rem;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.rc-card.catalyst h3{color:#2ea043}
.rc-card.risk h3{color:#f85149}
.rc-item{padding:10px 0;border-bottom:1px solid #21262d;font-size:0.85rem;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.rc-item:last-child{border-bottom:none}
.rc-item .importance{font-size:0.75rem;padding:2px 8px;border-radius:4px;white-space:nowrap;font-weight:500}
.importance-high{background:#f8514922;color:#f85149}
.importance-mid{background:#d2992222;color:#d29922}
.catalyst .importance-high{background:#2ea04322;color:#2ea043}

/* Valuation */
.val-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.val-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;text-align:center}
.val-card.low{border-top:4px solid #2ea043}
.val-card.mid{border-top:4px solid #58a6ff}
.val-card.high{border-top:4px solid #f85149}
.val-card .scenario{font-size:0.85rem;font-weight:700;margin-bottom:12px}
.val-card.low .scenario{color:#2ea043}
.val-card.mid .scenario{color:#58a6ff}
.val-card.high .scenario{color:#f85149}
.val-card .price{font-size:2rem;font-weight:700;margin:8px 0}
.val-card .detail{font-size:0.82rem;color:#8b949e;margin:4px 0}
.val-card .deviation{font-size:0.9rem;font-weight:700;margin-top:8px}
.val-card .judgment{font-size:0.82rem;margin-top:4px;padding:4px 12px;border-radius:6px;display:inline-block}

/* Comment */
.comment-item{padding:16px 0;border-bottom:1px solid #21262d}
.comment-item:last-child{border-bottom:none}
.comment-item .speaker{font-weight:700;color:#58a6ff;font-size:0.9rem;margin-bottom:6px}
.comment-item .text{font-size:0.88rem;color:#c9d1d9}

/* FCF Flow */
.fcf-flow{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;margin:20px 0}
.fcf-node{background:#21262d;border-radius:10px;padding:14px 20px;text-align:center;min-width:120px}
.fcf-node .yr{font-size:0.78rem;color:#8b949e}
.fcf-node .val{font-size:1.2rem;font-weight:700;color:#2ea043}
.fcf-arrow{font-size:1.4rem;color:#484f58}

/* KPI highlight */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.kpi-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px}
.kpi-card .kpi-label{font-size:0.82rem;color:#8b949e;margin-bottom:4px}
.kpi-card .kpi-value{font-size:1.3rem;font-weight:700;color:#e6edf3}
.kpi-card .kpi-sub{font-size:0.8rem;color:#2ea043;margin-top:4px}

/* Current price bar */
.current-price{text-align:center;margin-top:16px;font-size:0.9rem;color:#8b949e}
.current-price span{color:#e6edf3;font-weight:700;font-size:1.1rem}

/* Responsive */


/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
.header-content { position: relative; z-index: 1; }
.ticker-badge {
  display: inline-block;
  background: rgba(88,166,255,0.15);
  border: 1px solid rgba(88,166,255,0.3);
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 14px;
  color: var(--blue);
  margin-bo
.header .date { color: var(--text-sub); font-size: 0.85em; margin-top: 8px; }
ttom: 12px;
  letter-spacing: 1px;
}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
