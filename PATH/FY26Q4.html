<style>
:root {
  --bg-primary: #0d1117;
  --bg-card: #161b22;
  --bg-card-alt: #1c2333;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --green: #2ea043;
  --green-light: #3fb950;
  --green-bg: rgba(46,160,67,0.15);
  --red: #f85149;
  --red-light: #ff7b72;
  --red-bg: rgba(248,81,73,0.15);
  --blue: #58a6ff;
  --blue-bg: rgba(88,166,255,0.15);
  --purple: #bc8cff;
  --purple-bg: rgba(188,140,255,0.15);
  --orange: #d29922;
  --orange-bg: rgba(210,153,34,0.15);
  --yellow: #e3b341;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.7;
  padding: 0;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
}
/* Header */
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(88,166,255,0.05) 0%, transparent 50%),
              radial-gradient(circle at 70% 50%, rgba(46,160,67,0.05) 0%, transparent 50%);
  pointer-events: none;
}
.header-ticker {
  display: inline-block;
  background: var(--blue-bg);
  border: 1px solid rgba(88,166,255,0.3);
  color: var(--blue);
  padding: 4px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.header h1 {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 8px;
  position: relative;
}
.header .subtitle {
  color: var(--text-secondary);
  font-size: 15px;
  font-weight: 400;
}
.header .date-badge {
  display: inline-block;
  margin-top: 12px;
  color: var(--text-muted);
  font-size: 13px;
  background: rgba(255,255,255,0.05);
  padding: 4px 14px;
  border-radius: 12px;
}

/* Score Section */
.score-section {
  text-align: center;
  padding: 40px 20px;
  background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-primary) 100%);
  border-bottom: 1px solid var(--border);
}
.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  background: var(--bg-card-alt);
  border: 2px solid var(--green);
  border-radius: 20px;
  padding: 20px 40px;
  box-shadow: 0 0 40px rgba(46,160,67,0.15);
}
.score-number {
  font-size: 64px;
  font-weight: 900;
  color: var(--green-light);
  line-height: 1;
}
.score-detail {
  text-align: left;
}
.score-detail .label {
  font-size: 13px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.score-detail .verdict {
  font-size: 24px;
  font-weight: 700;
  color: var(--green-light);
}
.score-detail .emoji {
  font-size: 28px;
  margin-right: 4px;
}
.score-reason {
  max-width: 800px;
  margin: 20px auto 0;
  color: var(--text-secondary);
  font-size: 14px;
  line-height: 1.8;
  background: rgba(46,160,67,0.06);
  border: 1px solid rgba(46,160,67,0.15);
  border-radius: 12px;
  padding: 16px 24px;
}

/* Section */
.section {
  margin: 32px 0;
}
.section-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .icon {
  font-size: 22px;
}

/* Cards Grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: border-color 0.2s;
}
.card:hover {
  border-color: var(--blue);
}
.card .card-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.card .card-value {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 6px;
}
.card .card-sub {
  font-size: 13px;
  color: var(--text-secondary);
}
.positive { color: var(--green-light); }
.negative { color: var(--red-light); }
.neutral { color: var(--text-primary); }

/* Beat Cards */
.beat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 16px;
}
.beat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.beat-card .beat-icon {
  font-size: 36px;
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  flex-shrink: 0;
}
.beat-card .beat-icon.green {
  background: var(--green-bg);
}
.beat-card .beat-content .beat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.beat-card .beat-content .beat-value {
  font-size: 22px;
  font-weight: 700;
}
.beat-card .beat-content .beat-detail {
  font-size: 13px;
  color: var(--text-secondary);
}

/* Chart Container */
.chart-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 16px;
}
.chart-wrapper {
  position: relative;
  height: 320px;
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg-card);
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.data-table th {
  background: var(--bg-card-alt);
  padding: 12px 16px;
  text-align: left;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  font-weight: 500;
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.data-table tr:last-child td {
  border-bottom: none;
}
.data-table tr:hover td {
  background: rgba(255,255,255,0.02);
}

/* Guidance Cards */
.guidance-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.guidance-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.guidance-card .g-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.guidance-card .g-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 14px;
}
.guidance-card .g-row .g-key {
  color: var(--text-secondary);
}
.guidance-card .g-verdict {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 14px;
  font-weight: 700;
}

/* CF Grid */
.cf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
}
.cf-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}
.cf-card .cf-label {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.cf-card .cf-value {
  font-size: 24px;
  font-weight: 700;
}

/* Segment */
.segment-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 16px;
}
.segment-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}
.segment-card h4 {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.segment-item {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.segment-item .seg-bar-bg {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
}
.segment-item .seg-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
}
.segment-item .seg-label {
  width: 160px;
  font-size: 13px;
  flex-shrink: 0;
}
.segment-item .seg-value {
  font-size: 13px;
  font-weight: 500;
  width: 80px;
  text-align: right;
  flex-shrink: 0;
}

/* SaaS KPI */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
}
.kpi-card.blue::before { background: var(--blue); }
.kpi-card.green::before { background: var(--green); }
.kpi-card.purple::before { background: var(--purple); }
.kpi-card.orange::before { background: var(--orange); }
.kpi-card .kpi-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.kpi-card .kpi-value {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 6px;
}
.kpi-card .kpi-sub {
  font-size: 13px;
  color: var(--text-secondary);
}

/* Comments */
.comment-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.comment-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: 0 12px 12px 0;
  padding: 18px 22px;
}
.comment-item .comment-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--blue);
}
.comment-item .comment-text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.8;
}

/* Risk / Catalyst */
.rc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 16px;
}
.rc-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}
.rc-card h4 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.rc-item {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.7;
}
.rc-item .rc-bullet {
  flex-shrink: 0;
  margin-top: 2px;
}
.rc-item .rc-title {
  font-weight: 700;
}

/* Comparison */
.compare-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
}
.compare-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.compare-box {
  text-align: center;
  padding: 16px 28px;
  background: var(--bg-card-alt);
  border-radius: 12px;
  min-width: 140px;
}
.compare-box .cmp-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.compare-box .cmp-value {
  font-size: 28px;
  font-weight: 700;
}
.compare-arrow {
  font-size: 28px;
  color: var(--green-light);
}
.compare-summary {
  background: var(--green-bg);
  border: 1px solid rgba(46,160,67,0.2);
  border-radius: 10px;
  padding: 16px 20px;
  font-size: 14px;
  line-height: 1.8;
}

/* Valuation */
.val-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 16px;
}
.val-card {
  border-radius: 14px;
  padding: 28px;
  text-align: center;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.val-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
}
.val-card.low {
  background: linear-gradient(180deg, rgba(46,160,67,0.08) 0%, var(--bg-card) 40%);
}
.val-card.low::before { background: var(--green); }
.val-card.mid {
  background: linear-gradient(180deg, rgba(88,166,255,0.08) 0%, var(--bg-card) 40%);
}
.val-card.mid::before { background: var(--blue); }
.val-card.high {
  background: linear-gradient(180deg, rgba(188,140,255,0.08) 0%, var(--bg-card) 40%);
}
.val-card.high::before { background: var(--purple); }
.val-card .val-scenario {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.val-card .val-label {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.val-card .val-price {
  font-size: 40px;
  font-weight: 900;
  margin-bottom: 8px;
}
.val-card .val-detail {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.val-card .val-gap {
  margin-top: 12px;
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
}
.val-card.low .val-gap {
  background: var(--red-bg);
  color: var(--red-light);
}
.val-card.mid .val-gap {
  background: var(--green-bg);
  color: var(--green-light);
}
.val-card.high .val-gap {
  background: var(--green-bg);
  color: var(--green-light);
}

/* Analyst */
.analyst-bar {
  display: flex;
  height: 12px;
  border-radius: 6px;
  overflow: hidden;
  margin: 12px 0;
}
.analyst-bar .buy { background: var(--green); }
.analyst-bar .hold { background: var(--orange); }
.analyst-bar .sell { background: var(--red); }
.analyst-legend {
  display: flex;
  gap: 20px;
  justify-content: center;
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
}
.analyst-legend span::before {
  content: '';
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}
.analyst-legend .l-buy::before { background: var(--green); }
.analyst-legend .l-hold::before { background: var(--orange); }
.analyst-legend .l-sell::before { background: var(--red); }

/* Footer */
.footer {
  text-align: center;
  padding: 32px 20px;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}
.footer a {
  color: var(--blue);
  text-decoration: none;
}

/* Valuation Extra */
.val-extra {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
}
.val-metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-top: 12px;
}
.val-metric-item {
  text-align: center;
  padding: 12px;
  background: var(--bg-card-alt);
  border-radius: 8px;
}
.val-metric-item .vm-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.val-metric-item .vm-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--blue);
}

/* Stock Badge */
.stock-info {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 16px;
}
.stock-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-card-alt);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
}




/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
.header-content { position: relative; z-index: 1; }
.ticker-badge {
  display: inline-block;
  background: rgba(88,166,255,0.15);
  border: 1px solid rgba(88,166,255,0.3);
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 14px;
  color: var(--blue);
  margin-bottom: 12px;
  letter-spacing: 1px;
}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
