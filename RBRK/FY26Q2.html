<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#0d1117;color:#e6edf3;line-height:1.7;padding:20px}
.container{max-width:1200px;margin:0 auto}
h1{font-size:2rem;font-weight:900;margin-bottom:8px}
h2{font-size:1.5rem;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #30363d}
h3{font-size:1.1rem;font-weight:700;margin-bottom:10px;color:#8b949e}
.section{margin-bottom:40px}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;margin-bottom:16px}
.card-sm{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px;text-align:center}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.green{color:#3fb950}.red{color:#f85149}.yellow{color:#d29922}.blue{color:#58a6ff}.gray{color:#8b949e}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700}
.badge-green{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.badge-red{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3)}
.badge-blue{background:rgba(88,166,255,.15);color:#58a6ff;border:1px solid rgba(88,166,255,.3)}
.badge-yellow{background:rgba(210,153,34,.15);color:#d29922;border:1px solid rgba(210,153,34,.3)}
.metric-value{font-size:2rem;font-weight:900;line-height:1.2}
.metric-label{font-size:.85rem;color:#8b949e;margin-top:4px}
.metric-sub{font-size:.8rem;margin-top:4px}
.score-box{text-align:center;padding:40px 20px;background:linear-gradient(135deg,#161b22,#1c2431);border:2px solid #30363d;border-radius:16px}
.score-number{font-size:5rem;font-weight:900;background:linear-gradient(135deg,#58a6ff,#3fb950);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.score-icon{font-size:3rem;margin:8px 0}
.score-label{font-size:1.5rem;font-weight:700;color:#58a6ff}
.chart-container{position:relative;height:350px;width:100%}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #21262d;font-size:.9rem}
th{color:#8b949e;font-weight:500;font-size:.8rem;text-transform:uppercase}
.comment-box{background:#1c2431;border-left:4px solid #58a6ff;padding:16px 20px;border-radius:0 8px 8px 0;margin-bottom:12px;font-size:.95rem}
.risk-item,.catalyst-item{padding:10px 16px;border-radius:8px;margin-bottom:8px;font-size:.9rem}
.risk-item{background:rgba(248,81,73,.08);border-left:3px solid #f85149}
.catalyst-item{background:rgba(63,185,80,.08);border-left:3px solid #3fb950}
.val-card{border-radius:12px;padding:24px;text-align:center}
.val-low{background:linear-gradient(135deg,#0d2818,#1a3a2a);border:1px solid #2ea043}
.val-mid{background:linear-gradient(135deg,#0d1b2e,#162844);border:1px solid #58a6ff}
.val-high{background:linear-gradient(135deg,#2d1320,#3d1a2e);border:1px solid #da3633}
.val-price{font-size:2.5rem;font-weight:900;margin:8px 0}
.header-bar{background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid #30363dposition:relative;overflow:hidden;}
.header-bar::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
.ticker-badge{background:linear-gradient(135deg,#58a6ff,#388bfd);color:#fff;padding:6px 16px;border-radius:8px;font-weight:900;font-size:1.1rem}
.company-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
.company-info-item{display:flex;gap:8px;font-size:.9rem;padding:8px 12px;background:#1c2431;border-radius:6px}
.company-info-item .label{color:#8b949e;min-width:80px;flex-shrink:0}
.company-info-item .value{color:#e6edf3;font-weight:500}
.trend-up::before{content:'▲ ';color:#3fb950;font-size:.75rem}
.trend-down::before{content:'▼ ';color:#f85149;font-size:.75rem}
.compare-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #21262d}
.compare-label{color:#8b949e;font-size:.9rem}
.compare-values{display:flex;gap:20px;align-items:center;font-size:.9rem}
.compare-arrow{color:#58a6ff;font-weight:700;font-size:1.1rem}
footer{text-align:center;color:#484f58;font-size:.8rem;padding:40px 0 20px;border-top:1px solid #21262d;margin-top:40px}


/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}

.header-content { position: relative; z-index: 1; }
.header h1 { font-size: 2.2em; font-weight: 900; margin-bottom: 4px; }
.header .subtitle { color: var(--text-sub); font-size: 1.1em; }
.header .date { color: var(--text-sub); font-size: 0.85em; margin-top: 8px; }
.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(88,166,255,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 50%, rgba(46,160,67,0.06) 0%, transparent 60%);
}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
