<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;
--text:#e6edf3;--text-sub:#8b949e;--text-dim:#484f58;
--green:#3fb950;--green-bg:rgba(63,185,80,.12);--green-soft:#238636;
--red:#f85149;--red-bg:rgba(248,81,73,.12);--red-soft:#da3633;
--blue:#58a6ff;--blue-bg:rgba(88,166,255,.12);
--yellow:#d29922;--yellow-bg:rgba(210,153,34,.12);
--purple:#bc8cff;--accent:#58a6ff;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding-bottom:60px}
.container{max-width:1200px;margin:0 auto;padding:0 20px}
/* Header */
.header {background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
.header h1{font-size:1.8rem;font-weight:700;margin-bottom:4px;letter-spacing:.5px}
.header .sub{color:var(--text-sub);font-size:.95rem;margin-bottom:16px}
.score-badge{display:inline-flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 32px;margin-top:8px}
.score-num{font-size:2.8rem;font-weight:700;color:var(--green)}
.score-label{text-align:left;font-size:.85rem;color:var(--text-sub)}
.score-label strong{display:block;font-size:1.1rem;color:var(--green)}
/* Section */
.section{margin-top:48px}
.section-title{font-size:1.25rem;font-weight:700;margin-bottom:20px;padding-left:14px;border-left:4px solid var(--accent);display:flex;align-items:center;gap:8px}
/* Cards */
.card-grid{display:grid;gap:16px}
.card-grid.cols-3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.card-grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}
.card-grid.cols-6{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card .label{font-size:.78rem;color:var(--text-sub);margin-bottom:4px;font-weight:500}
.card .value{font-size:1.6rem;font-weight:700}
.card .detail{font-size:.8rem;color:var(--text-sub);margin-top:4px}
.card .tag{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:6px;font-weight:500;margin-top:6px}
.tag.green{background:var(--green-bg);color:var(--green)}
.tag.red{background:var(--red-bg);color:var(--red)}
.tag.blue{background:var(--blue-bg);color:var(--blue)}
.tag.yellow{background:var(--yellow-bg);color:var(--yellow)}
.green-text{color:var(--green)}.red-text{color:var(--red)}.blue-text{color:var(--blue)}.yellow-text{color:var(--yellow)}
/* Chart containers */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;position:relative}
.chart-wrap canvas{max-height:360px}
/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:.88rem}
.data-table th,.data-table td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
.data-table th{color:var(--text-sub);font-weight:500;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(88,166,255,.04)}
/* Comment box */
.comment-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:12px}
.comment-box .speaker{font-size:.8rem;color:var(--accent);font-weight:700;margin-bottom:6px}
.comment-box .quote{font-size:.92rem;color:var(--text);line-height:1.8;font-style:italic;position:relative;padding-left:16px;border-left:3px solid var(--border)}
/* Risk / Catalyst */
.rc-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(48,54,61,.5)}
.rc-item:last-child{border-bottom:none}
.rc-num{min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700}
.rc-num.cat{background:var(--green-bg);color:var(--green)}
.rc-num.risk{background:var(--red-bg);color:var(--red)}
.rc-content{flex:1}
.rc-content .rc-title{font-weight:700;font-size:.9rem;margin-bottom:2px}
.rc-content .rc-desc{font-size:.8rem;color:var(--text-sub)}
.rc-importance{font-size:.7rem;padding:2px 8px;border-radius:6px;font-weight:500;white-space:nowrap;align-self:center}
.imp-high{background:var(--red-bg);color:var(--red)}
.imp-mid{background:var(--yellow-bg);color:var(--yellow)}
/* Valuation cards */
.val-card{border-radius:12px;padding:24px;text-align:center}
.val-card.low{background:linear-gradient(135deg,rgba(63,185,80,.08),rgba(63,185,80,.02));border:1px solid rgba(63,185,80,.3)}
.val-card.mid{background:linear-gradient(135deg,rgba(88,166,255,.08),rgba(88,166,255,.02));border:1px solid rgba(88,166,255,.3)}
.val-card.high{background:linear-gradient(135deg,rgba(248,81,73,.08),rgba(248,81,73,.02));border:1px solid rgba(248,81,73,.3)}
.val-card .scenario{font-size:.8rem;font-weight:700;margin-bottom:12px}
.val-card .price{font-size:2.2rem;font-weight:700;margin:8px 0}
.val-card .val-detail{font-size:.8rem;color:var(--text-sub);margin:4px 0}
/* Donut legend */
.donut-legend{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:16px}
.donut-legend span{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--text-sub)}
.donut-legend span::before{content:'';width:12px;height:12px;border-radius:3px}
/* Pill */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:.75rem;padding:3px 10px;border-radius:20px;font-weight:500}
/* Footer */
.footer{text-align:center;color:var(--text-dim);font-size:.75rem;margin-top:60px;padding:20px;border-top:1px solid var(--border)}
/* Reason box */
.reason-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-top:16px;font-size:.88rem;color:var(--text-sub);line-height:1.8}
/* Progress bar */
.progress-wrap{margin:8px 0}
.progress-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s}


/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
.header-content { position: relative; z-index: 1; }
.ticker-badge {
  display: inline-block;
  background: rgba(88,166,255,0.15);
  border: 1px solid rgba(88,166,255,0.3);
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 14px;
  color: var(--blue);
  margin-bottom: 12px;
.header .subtitle { color: var(--text-sub); font-size: 1.1em; }
.header .date { color: var(--text-sub); font-size: 0.85em; margin-top: 8px; }

  letter-spacing: 1px;
}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
