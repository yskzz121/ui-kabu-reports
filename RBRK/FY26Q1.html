<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:'Noto Sans JP',sans-serif;line-height:1.7;padding:0 0 60px}
.container{max-width:1100px;margin:0 auto;padding:0 20px}
header{background:linear-gradient(135deg, #1a2332 0%, #0d1117 50%, #1a1a2e 100%);border-bottom:1px solid #30363d;padding:36px 0 28px;text-align:centerposition:relative;overflow:hidden;}
header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(88,166,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,160,67,0.06) 0%,transparent 60%)}
header h1{font-size:1.6rem;font-weight:700;letter-spacing:.02em}
header .subtitle{color:#8b949e;font-size:.9rem;margin-top:6px}
.ticker-badge{display:inline-block;background:#388bfd22;color:#58a6ff;border:1px solid #388bfd44;border-radius:6px;padding:2px 10px;font-weight:700;font-size:.85rem;margin-right:8px}
.section{margin-top:36px}
.section-title{font-size:1.15rem;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:1.2rem}

/* Cards */
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:22px 24px;margin-bottom:16px}
.card-grid{display:grid;gap:14px}
.card-grid.c2{grid-template-columns:repeat(2,1fr)}
.card-grid.c3{grid-template-columns:repeat(3,1fr)}
.card-grid.c4{grid-template-columns:repeat(4,1fr)}

.metric-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:18px 20px;text-align:center}
.metric-card .label{color:#8b949e;font-size:.75rem;font-weight:500;margin-bottom:4px}
.metric-card .value{font-size:1.5rem;font-weight:700}
.metric-card .sub{font-size:.75rem;margin-top:4px}
.green{color:#3fb950}.red{color:#f85149}.blue{color:#58a6ff}.gray{color:#8b949e}.yellow{color:#d29922}.white{color:#e6edf3}

/* Score */
.score-box{text-align:center;padding:32px 20px}
.score-number{font-size:4rem;font-weight:900;line-height:1}
.score-icon{font-size:3rem}
.score-label{font-size:1.3rem;font-weight:700;margin-top:8px}
.score-reason{color:#8b949e;font-size:.88rem;margin-top:10px;max-width:600px;display:inline-block}

/* Company */
.company-info{display:grid;grid-template-columns:1fr 1fr;gap:12px 32px;font-size:.88rem}
.company-info dt{color:#8b949e;font-weight:500}
.company-info dd{margin-bottom:4px}


/* Chart */
.chart-wrap{position:relative;height:320px;margin:10px 0}


/* Table */
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #21262d}
th{color:#8b949e;font-weight:500;font-size:.78rem;text-transform:uppercase}
tr:hover{background:#1c2129}

/* Valuation cards */
.val-card{border-radius:12px;padding:22px;text-align:center}
.val-low{background:#0d2818;border:1px solid #238636}
.val-mid{background:#0d1f3c;border:1px solid #1f6feb}
.val-high{background:#2a1520;border:1px solid #da3633}
.val-card .scenario{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.val-card .price{font-size:2rem;font-weight:900}
.val-card .detail{font-size:.78rem;color:#8b949e;margin-top:6px}

/* Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:500;margin:3px 4px 3px 0}
.tag-green{background:#23863622;color:#3fb950;border:1px solid #23863644}
.tag-red{background:#da363322;color:#f85149;border:1px solid #da363344}
.tag-blue{background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb44}

/* List */
.item-list{list-style:none;padding:0}
.item-list li{padding:10px 0;border-bottom:1px solid #21262d;font-size:.88rem;display:flex;gap:8px}
.item-list li:last-child{border-bottom:none}
.item-list .num{color:#8b949e;font-weight:700;min-width:22px}

/* Comparison */
.compare-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #21262d;font-size:.88rem;flex-wrap:wrap}
.compare-label{color:#8b949e;min-width:140px;font-weight:500}
.compare-arrow{font-size:1.1rem}

footer{text-align:center;color:#484f58;font-size:.75rem;margin-top:48px;padding:20px}

/* Report Logo */
.report-header-logo{height:48px;width:auto;max-width:180px;object-fit:contain;vertical-align:middle;margin-right:12px;opacity:.9;flex-shrink:0}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
.header-content { position: relative; z-index: 1; }
.header h1 { font-size: 2.2em; font-weight: 900; margin-bottom: 4px; }

.header .subtitle { color: var(--text-sub); font-size: 1.1em; }
.header .date { color: var(--text-sub); font-size: 0.85em; margin-top: 8px; }
.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(88,166,255,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 50%, rgba(46,160,67,0.06) 0%, transparent 60%);
}
/* === Mobile Responsive === */
.tradingview-widget-container{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  body{padding:12px!important}
  .container{padding:12px}
  .header{padding:28px 16px}
  .header h1{font-size:1.4rem}
  .header .subtitle{font-size:.95em}
  .header-logo-row{flex-direction:column;gap:8px}
  .report-header-logo{height:36px}
  .ticker-badge{font-size:12px;padding:4px 12px}
  .grid,.metrics-grid{grid-template-columns:1fr 1fr}
  .val-grid,.val-cards,.risk-grid{grid-template-columns:1fr}
  .chart-wrap,.chart-container{height:250px}
  .section{padding:20px 16px}
  .card-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .rc-grid{grid-template-columns:1fr}
  .saas-grid{grid-template-columns:1fr 1fr}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table,.tech-table,.tbl{font-size:.78rem}
  .portal-link{padding:6px 10px;font-size:.7rem}
}
@media(max-width:480px){
  .grid,.metrics-grid,.card-grid,.saas-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .score-big{font-size:3.5em}
  .score-label{font-size:1.2em}
  .section-title,.section-header{font-size:1rem}
}

</style>
